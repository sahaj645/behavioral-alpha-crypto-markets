name: CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings.
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Verify notebook exists and is valid JSON
      run: |
        if [ ! -f "analysis.ipynb" ]; then
          echo "ERROR: analysis.ipynb not found"
          exit 1
        fi
        python -m json.tool analysis.ipynb > /dev/null && echo "Notebook JSON valid"

    - name: Verify data directory structure
      run: |
        if [ ! -d "data/raw" ]; then
          echo "ERROR: data/raw directory not found"
          exit 1
        fi
        if [ ! -d "data/figures" ]; then
          echo "ERROR: data/figures directory not found"
          exit 1
        fi
        echo "Data directories valid"

    - name: Check src module structure
      run: |
        if [ ! -f "src/__init__.py" ]; then
          echo "ERROR: src/__init__.py not found"
          exit 1
        fi
        files=("loader.py" "cleaner.py" "analysis.py" "visualizer.py")
        for file in "${files[@]}"; do
          if [ ! -f "src/$file" ]; then
            echo "ERROR: src/$file not found"
            exit 1
          fi
        done
        echo "All required source files present"

    - name: Test imports
      run: |
        python -c "from src import loader, cleaner, analysis, visualizer; print('All modules import successfully')"

    - name: Summary
      run: |
        echo "Pipeline complete: Linting passed, notebook valid, project structure verified"
